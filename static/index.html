<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>INE OCR API</title>
    <style>
      :root { color-scheme: light; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { margin: 0; min-height: 100vh; background: linear-gradient(135deg, #eef2ff, #f8fafc); color: #0f172a; display: grid; place-items: center; padding: 24px; }
      main { width: min(960px, 100%); background: rgba(255,255,255,.9); border: 1px solid #e2e8f0; border-radius: 28px; box-shadow: 0 24px 80px rgba(15,23,42,.12); overflow: hidden; }
      header { padding: 34px; background: linear-gradient(135deg, #1e293b, #334155); color: white; }
      h1 { margin: 0 0 8px; font-size: clamp(28px, 4vw, 44px); }
      p { line-height: 1.6; }
      section { padding: 34px; }
      form { display: grid; gap: 18px; }
      label { font-weight: 700; }
      input { width: 100%; box-sizing: border-box; padding: 14px; border: 1px solid #cbd5e1; border-radius: 14px; background: white; }
      button { border: 0; border-radius: 14px; padding: 14px 18px; background: #2563eb; color: white; font-weight: 800; cursor: pointer; }
      button:disabled { opacity: .55; cursor: wait; }
      pre { min-height: 220px; overflow: auto; background: #0f172a; color: #e2e8f0; border-radius: 18px; padding: 18px; white-space: pre-wrap; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 18px; }
      .card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 18px; padding: 18px; }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Verificación y extracción de datos INE</h1>
        <p>Sube una imagen de INE para probar el endpoint OCR antes de consumirlo desde tu sitio o Cloudflare Worker.</p>
      </header>
      <section class="grid">
        <div class="card">
          <form id="form">
            <div>
              <label for="file">Imagen de INE</label>
              <input id="file" name="file" type="file" accept="image/*" required />
            </div>
            <div>
              <label for="apiKey">API key opcional</label>
              <input id="apiKey" name="apiKey" type="password" placeholder="Solo si configuraste API_KEY en Render" />
            </div>
            <button id="button" type="submit">Extraer datos</button>
          </form>
        </div>
        <div class="card">
          <strong>Endpoint</strong>
          <p><code>POST /api/ine/extract</code></p>
          <p>Body: <code>multipart/form-data</code> con campo <code>file</code>.</p>
        </div>
      </section>
      <section>
        <h2>Respuesta</h2>
        <pre id="result">Esperando archivo...</pre>
      </section>
    </main>
    <script>
      const form = document.querySelector('#form');
      const button = document.querySelector('#button');
      const result = document.querySelector('#result');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const file = document.querySelector('#file').files[0];
        const apiKey = document.querySelector('#apiKey').value.trim();
        const body = new FormData();
        body.append('file', file);
        button.disabled = true;
        result.textContent = 'Procesando...';
        try {
          const headers = {};
          if (apiKey) headers['x-api-key'] = apiKey;
          const response = await fetch('/api/ine/extract', { method: 'POST', headers, body });
          const data = await response.json();
          result.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          result.textContent = error.message;
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
